name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Verify tarball contents
        run: |
          npm pack --dry-run --json | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            const files = data[0].files.map(f => f.path).sort();
            const allowedTop = new Set(['package.json', 'README.md', 'LICENSE']);
            const bad = files.filter(f => !f.startsWith('dist/') && !allowedTop.has(f));
            if (bad.length) {
              console.error('Tarball contains unexpected files:', bad);
              process.exit(1);
            }
            console.log('Tarball OK:', files.length, 'files');
          "
