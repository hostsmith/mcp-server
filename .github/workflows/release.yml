name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Stable releases on push to main under npm dist-tag 'latest'.
  # Pre-releases on workflow_dispatch from any non-main branch
  # (X.Y.Z-rc.N) under dist-tag 'rc'. cog computes the next version
  # from conventional commits, updates package.json + server.json +
  # CHANGELOG.md, commits "chore(version): X.Y.Z", and tags vX.Y.Z.
  # A pushed tag (manual cut) short-circuits the bump and goes straight
  # to build + publish.
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      released: ${{ steps.tag.outputs.released }}
    steps:
      # Mint a short-lived GitHub App installation token. Required so the
      # bump commit pushed below triggers downstream workflows (CI on the
      # PR branch, tag-push handler). The default GITHUB_TOKEN is blocked
      # from triggering other workflows by GitHub's anti-recursion rule.
      - id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Short-circuit on tag push
        if: github.ref_type == 'tag'
        id: tagpush
        run: echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Compute bump args
        if: github.ref_type != 'tag'
        id: args
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ github.ref_name }}"
            if [[ "$REF" == "main" ]]; then
              echo "Refusing to publish a prerelease from main; use a feature branch." >&2
              exit 1
            fi
            echo "value=--auto --pre rc.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "value=--auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture pre-bump tag
        if: github.ref_type != 'tag'
        id: before
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Bump
        if: github.ref_type != 'tag'
        id: bump
        uses: cocogitto/cocogitto-action@9a9fe03b31c47444290c0d7f9b1ee1b44ee13f20 # v4.1.0
        continue-on-error: true
        with:
          command: bump
          args: ${{ steps.args.outputs.value }}
          git-user: github-actions[bot]
          git-user-email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Resolve tag + released flag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            AFTER=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [[ -z "$AFTER" || "$AFTER" == "${{ steps.before.outputs.tag }}" ]]; then
              echo "released=false" >> "$GITHUB_OUTPUT"
              echo "No releasable commits since '${{ steps.before.outputs.tag }}'"
            else
              echo "released=true" >> "$GITHUB_OUTPUT"
              echo "tag=$AFTER" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Push commit + tag
        if: github.ref_type != 'tag' && steps.tag.outputs.released == 'true'
        run: |
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "${{ steps.tag.outputs.tag }}"

  build:
    needs: [release]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: Generate changelog for this tag
        id: changelog
        uses: cocogitto/cocogitto-action@9a9fe03b31c47444290c0d7f9b1ee1b44ee13f20 # v4.1.0
        with:
          command: changelog
          args: --at ${{ needs.release.outputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          TARBALL=$(ls *.tgz)
          {
            printf 'Install with:\n```\nnpm install @hostsmith/mcp-server@%s\n```\n\n' "${TAG#v}"
            printf 'Or from the GitHub Release tarball:\n```\nnpm install https://github.com/%s/releases/download/%s/%s\n```\n\n---\n\n' "${{ github.repository }}" "$TAG" "$TARBALL"
            cat <<'CHANGELOG'
          ${{ steps.changelog.outputs.stdout }}
          CHANGELOG
          } > release-notes.md
          PRERELEASE=""
          if [[ "$TAG" == *-* ]]; then PRERELEASE="--prerelease"; fi
          gh release create "$TAG" "$TARBALL" \
            $PRERELEASE \
            --title "$TAG" \
            --notes-file release-notes.md

  # Publishes @hostsmith/mcp-server to npm using GitHub OIDC (npm Trusted Publisher).
  # Stable tags (vX.Y.Z) publish under 'latest'. Prerelease tags (vX.Y.Z-*)
  # publish under 'rc' so they don't override the default install target.
  publish-npm:
    needs: [release, build]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Determine npm dist-tag
        id: disttag
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          if [[ "$TAG" == *-* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - run: npm publish --provenance --access public --tag ${{ steps.disttag.outputs.tag }}
