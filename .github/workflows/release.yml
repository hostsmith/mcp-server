name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # Stable releases on push to main (1.0.4, 1.0.5, ...) under npm dist-tag 'latest'.
  # Pre-releases on workflow_dispatch from any branch (X.Y.Z-rc.N) under dist-tag
  # 'rc'. The 'rc' identifier is shared across all branches, so the counter
  # increments globally regardless of which branch you dispatch from.
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.semver.outputs.tag }}
      released: ${{ steps.semver.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute branches config
        id: branches
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ github.ref_name }}"
            if [[ "$REF" == "main" ]]; then
              echo "Refusing to publish a prerelease from main; use a feature branch." >&2
              exit 1
            fi
            echo "value=[\"main\", { \"name\": \"$REF\", \"prerelease\": \"rc\" }]" >> "$GITHUB_OUTPUT"
          else
            echo 'value=["main"]' >> "$GITHUB_OUTPUT"
          fi

      - name: Semver Release
        id: semver
        uses: huggingface/semver-release-action@1a164868d29fb12acd39d70e8e47326db9d78ad2
        with:
          branches: ${{ steps.branches.outputs.value }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [release]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Set version from release tag
        run: |
          VERSION="${{ needs.release.outputs.tag }}"
          npm version "$VERSION" --no-git-tag-version
          # Keep server.json version in sync with package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const sj = JSON.parse(fs.readFileSync('server.json', 'utf8'));
            sj.version = pkg.version;
            for (const p of sj.packages || []) p.version = pkg.version;
            fs.writeFileSync('server.json', JSON.stringify(sj, null, 2) + '\n');
          "

      - run: npm run typecheck

      - run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: Upload tarball to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARBALL=$(ls *.tgz)
          TAG="${{ needs.release.outputs.tag }}"
          NOTES=$(printf 'Install with:\n```\nnpm install @hostsmith/mcp-server@%s\n```\n\nOr from the GitHub Release tarball:\n```\nnpm install https://github.com/%s/releases/download/%s/%s\n```' "${TAG#v}" "${{ github.repository }}" "$TAG" "$TARBALL")
          gh release edit "$TAG" --notes "$NOTES"
          gh release upload "$TAG" "$TARBALL"

  # Publishes @hostsmith/mcp-server to npm using GitHub OIDC (npm Trusted Publisher).
  # Stable tags (vX.Y.Z) publish under 'latest'. Prerelease tags (vX.Y.Z-*)
  # publish under 'rc' so they don't override the default install target.
  publish-npm:
    needs: [release, build]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      - name: Set version from release tag
        run: npm version "${{ needs.release.outputs.tag }}" --no-git-tag-version

      - run: npm run typecheck

      - run: npm run build

      - name: Determine npm dist-tag
        id: disttag
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          if [[ "$TAG" == *-* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - run: npm publish --provenance --access public --tag ${{ steps.disttag.outputs.tag }}
