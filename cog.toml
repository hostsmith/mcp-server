tag_prefix = "v"
ignore_merge_commits = true

# CI uses cog to compute the next version, run pre_bump_hooks that stamp
# package.json + server.json, write CHANGELOG.md, and create a single
# "chore(version): vX.Y.Z" commit + tag. CI pushes the bump commit + tag
# to main using a GitHub App token (RELEASE_APP_CLIENT_ID +
# RELEASE_APP_PRIVATE_KEY) that has bypass rights on main's branch
# protection. Prereleases (workflow_dispatch) do NOT call cog bump - they
# compute the rc version separately and never commit, tag, or update the
# changelog.
disable_changelog = false
disable_bump_commit = false

pre_bump_hooks = [
  "npm version {{version}} --no-git-tag-version --allow-same-version",
  "node scripts/stamp-server-json.mjs {{version}}",
  "git add package.json package-lock.json server.json",
]

[changelog]
remote = "github.com"
owner = "hostsmith"
repository = "mcp-server"
